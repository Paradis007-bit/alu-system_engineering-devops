<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Ceci n'est pas une page</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #f5f0e8;
      --ink: #1a1208;
      --rust: #c4472a;
      --gold: #d4a853;
      --muted: #8a7f72;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    .container {
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
    }

    /* LEFT PANEL */
    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 50px 60px 70px;
      border-right: 1px solid rgba(26,18,8,0.12);
      position: relative;
      animation: fadeSlideLeft 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .left::after {
      content: '';
      position: absolute;
      bottom: 0; left: 70px; right: 50px;
      height: 1px;
      background: linear-gradient(to right, var(--rust), transparent);
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
      animation: fadeSlideLeft 0.9s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .four-oh-four {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(100px, 14vw, 160px);
      line-height: 0.9;
      color: var(--ink);
      position: relative;
      animation: fadeSlideLeft 0.9s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .four-oh-four span {
      color: var(--rust);
      font-style: italic;
    }

    .pipe-line {
      width: 40px;
      height: 2px;
      background: var(--gold);
      margin: 28px 0;
      animation: expandWidth 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .magritte-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(18px, 2.2vw, 26px);
      color: var(--ink);
      line-height: 1.4;
      animation: fadeSlideLeft 0.9s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .magritte-text em {
      color: var(--rust);
      font-style: normal;
      font-weight: 400;
    }

    .subtitle {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 320px;
      animation: fadeSlideLeft 0.9s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .actions {
      display: flex;
      gap: 16px;
      margin-top: 40px;
      animation: fadeSlideLeft 0.9s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--ink);
      color: var(--ink);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--ink);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }

    .btn:hover::before { transform: scaleX(1); }
    .btn:hover { color: var(--cream); }
    .btn span { position: relative; z-index: 1; }

    .btn-primary {
      background: var(--rust);
      border-color: var(--rust);
      color: var(--cream);
    }
    .btn-primary::before { background: var(--ink); }
    .btn-primary:hover { color: var(--cream); }

    /* RIGHT PANEL */
    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
      animation: fadeSlideRight 0.9s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Decorative background circles */
    .right::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      border: 1px solid rgba(26,18,8,0.06);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: rotateSlow 30s linear infinite;
    }
    .right::after {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      border: 1px dashed rgba(196,71,42,0.1);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: rotateSlow 50s linear infinite reverse;
    }

    .pipe-illustration {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    /* Magritte-style pipe SVG */
    .pipe-svg {
      width: clamp(220px, 28vw, 320px);
      filter: drop-shadow(4px 8px 20px rgba(26,18,8,0.12));
      animation: floatPipe 4s ease-in-out infinite;
    }

    .pipe-caption {
      margin-top: 28px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(13px, 1.4vw, 16px);
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .pipe-caption strong {
      color: var(--rust);
      font-weight: 400;
    }

    /* Corner decorations */
    .corner {
      position: absolute;
      width: 30px; height: 30px;
    }
    .corner-tl { top: 24px; left: 24px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner-tr { top: 24px; right: 24px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

    /* Footer line */
    .footer-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(to right, var(--rust), var(--gold), var(--rust));
      animation: slideInBottom 1s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Floating dots */
    .dot {
      position: absolute;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.35;
      animation: floatDot var(--dur, 6s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    /* Animations */
    @keyframes fadeSlideLeft {
      from { opacity: 0; transform: translateX(-24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeSlideRight {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes expandWidth {
      from { width: 0; }
      to   { width: 40px; }
    }
    @keyframes rotateSlow {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }
    @keyframes floatPipe {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50%       { transform: translateY(-14px) rotate(2deg); }
    }
    @keyframes floatDot {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-20px); }
    }
    @keyframes slideInBottom {
      from { transform: scaleX(0); transform-origin: left; }
      to   { transform: scaleX(1); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; grid-template-rows: auto auto; overflow-y: auto; }
      html, body { overflow: auto; }
      .left { padding: 50px 32px; border-right: none; border-bottom: 1px solid rgba(26,18,8,0.12); }
      .right { padding: 40px 32px; min-height: 300px; }
      .left::after { left: 32px; right: 32px; }
    }
  </style>
</head>
<body>

  <div class="corner-tl corner"></div>
  <div class="corner-tr corner"></div>
  <div class="corner-bl corner"></div>
  <div class="corner-br corner"></div>

  <div class="container">
    <!-- LEFT -->
    <div class="left">
      <p class="label">Error / Page introuvable</p>

      <div class="four-oh-four">4<span>0</span>4</div>

      <div class="pipe-line"></div>

      <p class="magritte-text">
        Ceci n'est pas<br/>
        <em>une page.</em>
      </p>

      <p class="subtitle">
        What you're looking for doesn't exist here —<br/>
        much like Magritte's pipe, the image of a thing<br/>
        is not the thing itself.
      </p>

      <div class="actions">
        <a href="/" class="btn btn-primary"><span>← Go Home</span></a>
        <a href="javascript:history.back()" class="btn"><span>Go Back</span></a>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <!-- Floating dots -->
      <div class="dot" style="width:6px;height:6px;top:20%;left:15%;--dur:5s;--delay:0s;"></div>
      <div class="dot" style="width:4px;height:4px;top:70%;left:80%;--dur:7s;--delay:1s;"></div>
      <div class="dot" style="width:8px;height:8px;top:40%;left:85%;--dur:6s;--delay:2s;"></div>
      <div class="dot" style="width:5px;height:5px;top:80%;left:25%;--dur:8s;--delay:0.5s;"></div>

      <div class="pipe-illustration">
        <!-- Hand-drawn style pipe SVG -->
        <svg class="pipe-svg" viewBox="0 0 340 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Pipe bowl -->
          <path d="M80 40 C80 20 110 15 130 15 L170 15 C190 15 200 25 200 40 L200 90 C200 105 190 115 170 115 L130 115 C110 115 80 108 80 90 Z" fill="#5c3d1e" stroke="#3a2510" stroke-width="2"/>
          <!-- Pipe bowl highlight -->
          <path d="M95 30 C95 22 112 18 128 18 L168 18 C182 18 188 26 188 35" stroke="#8b6340" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
          <!-- Pipe bowl rim -->
          <ellipse cx="140" cy="15" rx="30" ry="6" fill="#4a2e0f" stroke="#3a2510" stroke-width="1.5"/>
          <!-- Pipe stem - curved -->
          <path d="M80 75 C60 80 40 82 20 80 L10 78" stroke="#3a2510" stroke-width="14" stroke-linecap="round" fill="none"/>
          <path d="M80 75 C60 80 40 82 20 80 L10 78" stroke="#5c3d1e" stroke-width="10" stroke-linecap="round" fill="none"/>
          <!-- Pipe stem highlight -->
          <path d="M75 70 C55 74 35 76 16 74" stroke="#8b6340" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
          <!-- Smoke puffs -->
          <circle cx="150" cy="5" r="5" fill="#c4472a" opacity="0.15"/>
          <circle cx="162" cy="-4" r="7" fill="#c4472a" opacity="0.1"/>
          <circle cx="140" cy="-8" r="4" fill="#d4a853" opacity="0.12"/>
          <!-- Smoke wisps -->
          <path d="M140 14 C138 5 142 -2 138 -8" stroke="#8a7f72" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
          <path d="M150 13 C152 3 148 -3 152 -10" stroke="#8a7f72" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.3"/>
          <path d="M160 14 C163 4 159 -2 163 -9" stroke="#8a7f72" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.25"/>
          <!-- Shadow under pipe -->
          <ellipse cx="120" cy="130" rx="70" ry="8" fill="rgba(26,18,8,0.08)"/>
        </svg>

        <p class="pipe-caption">
          René Magritte, <strong>"La trahison des pages"</strong><br/>
          <span style="font-size:11px; opacity:0.6;">This is not a page — 2024</span>
        </p>
      </div>
    </div>
  </div>

  <div class="footer-bar"></div>

</body>
</html>
